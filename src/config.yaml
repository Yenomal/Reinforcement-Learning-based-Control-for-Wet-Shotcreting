# 环境参数
env:
  seed: 42                            # 环境随机种子
  n_theta: 200                        # 岩壁周向采样数
  n_z: 100                            # 岩壁轴向采样数
  rock_env_html: outputs/rock_environment.html # 岩壁可视化输出

# 任务采样参数
planner:
  seed: 42                   # 任务随机种子
  margin_ratio: 0.05         # 起终点边界留白比例
  min_start_goal_ratio: 0.30 # 起终点最小间距比例
  normal_neighbors: 32       # 法向估计邻居数
  retreat_distance: 1.0      # 沿法向回退距离

# 扰动参数
disturbance:
  sensor_noise:
    enable: true                # 是否开启传感器噪声
    current_uv_step_std: 0.001     # 当前 uv 每步高斯噪声
    current_uv_bias_std: 0.002     # 当前 uv 每局固定偏置
    goal_uv_step_std: 0.0        # 目标 uv 每步高斯噪声
    goal_uv_bias_std: 0.0        # 目标 uv 每局固定偏置

# 强化学习环境参数
rl:
  env_name: math_env         # RL 环境名称
  max_episode_steps: 800      # 单局最大步数
  goal_tolerance_uv: 0.003    # 到达目标的阈值
  action_scale_u: 0.05       # u 方向动作步长
  action_scale_v: 0.05       # v 方向动作步长
  progress_reward_weight: 3.0 # 朝目标前进奖励权重
  success_reward: 80.0        # 到达终点奖励
  step_penalty: 0.001         # 每步基础惩罚
  action_l2_weight: 0.0001    # 动作幅度惩罚
  action_smoothness_weight: 0.001 # 动作变化惩罚
  boundary_penalty: 0.05      # 边界裁剪惩罚

# 模型参数
model:
  hidden_sizes: [256, 256] # MLP 隐藏层大小
  activation: tanh         # MLP 激活函数
  init_log_std: -0.5       # 初始动作方差对数

# 算法公共参数
algorithm:
  name: ppo   # 当前算法名称
  gamma: 0.99 # 折扣因子

# PPO 专有参数
ppo:
  total_updates: 200         # 总更新次数
  lr: 1.0e-4                 # 学习率
  gae_lambda: 0.95           # GAE 参数
  clip_ratio: 0.2            # PPO 截断系数
  value_coef: 0.5            # 值函数损失权重
  entropy_coef: 0.000        # 熵奖励权重
  max_grad_norm: 0.5         # 梯度裁剪上限
  rollout_steps: 2048        # 每次更新采样步数
  update_epochs: 50          # 每次更新轮数
  minibatch_size: 256        # 小批量大小
  normalize_advantages: true # 是否归一化优势

# SAC 预留参数
sac:
  total_steps: 200000    # 总环境步数
  actor_lr: 3.0e-4       # actor 学习率
  critic_lr: 3.0e-4      # critic 学习率
  alpha_lr: 3.0e-4       # 熵系数学习率
  tau: 0.005             # 目标网络软更新系数
  batch_size: 256        # 采样批量大小
  buffer_size: 200000    # 回放池大小
  learning_starts: 5000  # 开始学习前的随机探索步数
  updates_per_step: 1    # 每步环境交互后的更新次数
  log_interval_steps: 2000 # 打印间隔步数
  save_interval_steps: 10000 # 保存间隔步数
  alpha_init: 0.2        # 初始熵系数
  target_entropy: auto   # 目标熵
  log_std_min: -5.0      # actor 最小 log_std
  log_std_max: 2.0       # actor 最大 log_std

# 训练入口参数
train:
  seed: 42                   # 训练随机种子
  device: cpu                # 训练设备
  log_interval: 1            # 终端打印间隔
  save_interval: 10          # 权重保存间隔
  runs_root: outputs/runs    # 训练输出根目录

# 评估参数
eval:
  checkpoint: "./outputs/runs/sac_math_env_20260406_191355/best.pt"      # 默认权重路径
  episodes: 5         # 评估回合数
  seed: 123           # 评估随机种子
  headless: false     # 是否关闭可视化
  render_pause: 0.05  # 渲染刷新间隔
  episode_pause: 0.8  # 回合切换停顿
