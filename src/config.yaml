# 环境参数
env:
  seed: 42                            # 环境随机种子
  n_theta: 200                        # 岩壁周向采样数
  n_z: 100                            # 岩壁轴向采样数
  rock_env_html: outputs/rock_environment.html # 岩壁可视化输出

# 机器人参数
robot:
  kinematics_path: src/rock_3D/robot_4dof/kinematics.yaml

# 任务采样参数
planner:
  seed: 42                          # 任务随机种子
  spray_angle_range_deg: [-60.0, 60.0] # 以拱顶为 0 度，湿喷区域角度范围
  spray_standoff_distance: 0.5        # 从壁面沿法向向内投影的目标距离
  axial_margin_ratio: 0.05          # 隧道轴向两端留白比例，避免贴边采样
  tunnel_axial_scale: 1.5           # 旧数学隧道轴向到 PyBullet 世界坐标的缩放
  use_reachability_check: false     # 是否启用随机关节采样近似可达性检查
  reachability_samples: 2048        # 可达性近似采样次数
  reachability_tolerance: 0.20      # 可达性判定容差
  max_goal_sampling_trials: 256     # 目标采样最大重试次数

# 扰动参数
disturbance:
  sensor_noise:
    enable: false                 # 是否开启传感器噪声
    current_point_step_std: 0.01 # 当前 3D 点每步高斯噪声
    current_point_bias_std: 0.02 # 当前 3D 点每局固定偏置
    goal_point_step_std: 0.0     # 目标 3D 点每步高斯噪声
    goal_point_bias_std: 0.0     # 目标 3D 点每局固定偏置

# 强化学习环境参数
rl:
  env_name: math_env         # RL 环境名称
  max_episode_steps: 200      # 单局最大步数
  initial_configuration_deg: [0.0, 0.0, 0.0, 0.0] # 起点固定关节角
  goal_tolerance: 0.2       # 3D 欧氏距离下的到达阈值
  max_joint_delta_deg: [4.0, 4.0, 4.0, 4.0] # 每步允许的最大关节变化量
  workspace_margin: 0.25     # FK 采样工作空间边界扩展
  progress_reward_weight: 2.0 # 朝目标前进奖励权重
  success_reward: 80.0        # 到达终点奖励
  step_penalty: 0.00         # 每步基础惩罚
  action_l2_weight: 0.000    # 动作幅度惩罚
  action_smoothness_weight: 0.00 # 动作变化惩罚
  boundary_penalty: 0.0      # 边界裁剪惩罚

# 模型参数
model:
  hidden_sizes: [256, 256] # MLP 隐藏层大小
  activation: tanh         # MLP 激活函数
  init_log_std: -2.0       # 初始动作方差对数

# 算法公共参数
algorithm:
  name: sac   # 当前算法名称
  gamma: 0.99 # 折扣因子

# PPO 专有参数
ppo:
  total_updates: 1000         # 总更新次数
  lr: 1.0e-5                 # 学习率
  gae_lambda: 0.95           # GAE 参数
  clip_ratio: 0.15            # PPO 截断系数
  value_coef: 5e-1            # 值函数损失权重
  normalize_value_targets: true # 是否归一化 value 目标
  entropy_coef: 0.005        # 熵奖励权重
  max_grad_norm: 0.5         # 梯度裁剪上限
  rollout_steps: 2048        # 每次更新采样步数
  update_epochs: 10          # 每次更新轮数
  minibatch_size: 512        # 小批量大小
  normalize_advantages: true # 是否归一化优势

# SAC 预留参数
sac:
  total_steps: 200000    # 总环境步数
  actor_lr: 3.0e-4       # actor 学习率
  critic_lr: 3.0e-4      # critic 学习率
  alpha_lr: 3.0e-4       # 熵系数学习率
  tau: 0.005             # 目标网络软更新系数
  batch_size: 256        # 采样批量大小
  buffer_size: 200000    # 回放池大小
  learning_starts: 5000  # 开始学习前的随机探索步数
  updates_per_step: 1    # 每步环境交互后的更新次数
  log_interval_steps: 2000 # 打印间隔步数
  save_interval_steps: 10000 # 保存间隔步数
  alpha_init: 0.2        # 初始熵系数
  target_entropy: auto   # 目标熵
  log_std_min: -5.0      # actor 最小 log_std
  log_std_max: 2.0       # actor 最大 log_std

# 训练入口参数
train:
  seed: 42                   # 训练随机种子
  device: cpu                # 训练设备
  log_interval: 1            # 终端打印间隔
  save_interval: 10          # 权重保存间隔
  runs_root: outputs/runs    # 训练输出根目录
  resume: false               # 是否恢复训练进度
  checkpoint: "" # 初始化或续训权重路径

# 评估参数
eval:
  checkpoint: "./outputs/runs/sac_math_env_20260414_092223/final.pt"      # 默认权重路径
  episodes: 5         # 评估回合数
  seed: 123           # 评估随机种子
  headless: false     # 是否关闭可视化
  digital_env_html: ./src/rock_3D/rock_environment.html # 数字环境固定背景 HTML，会按 PyBullet 坐标映射显示
  render_pause: 0.05  # 渲染刷新间隔
  episode_pause: 0.8  # 回合切换停顿
  pybullet:
    enable: true
    headless: false
    dt: 0.0041666667
    show_tunnel: true
    show_plane: false
    robot_position: [0.0, 0.0, 0.45]
    robot_yaw_deg: 90.0
    tunnel_position: [0.0, 0.0, 0.0]
